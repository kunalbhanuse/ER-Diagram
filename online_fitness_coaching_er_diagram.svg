<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1450" viewBox="0 0 1900 1450">
  <defs>
    <style>
      .bg { fill: #f7f8fa; }
      .entity { fill: #ffffff; stroke: #263238; stroke-width: 2; rx: 8; }
      .head { fill: #263238; }
      .headText { fill: #ffffff; font: 700 18px Arial, sans-serif; }
      .attr { fill: #111827; font: 14px Arial, sans-serif; }
      .key { fill: #0f766e; font: 700 14px Arial, sans-serif; }
      .fk { fill: #7c3aed; font: 700 14px Arial, sans-serif; }
      .line { stroke: #374151; stroke-width: 2; fill: none; }
      .rel { fill: #111827; font: 13px Arial, sans-serif; }
      .title { fill: #111827; font: 700 28px Arial, sans-serif; }
      .subtitle { fill: #4b5563; font: 16px Arial, sans-serif; }
      .note { fill: #374151; font: 13px Arial, sans-serif; }
    </style>
    <marker id="many" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 M1,7 L13,7" stroke="#374151" stroke-width="2" fill="none"/>
    </marker>
    <marker id="one" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M8,1 L8,9" stroke="#374151" stroke-width="2"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1900" height="1450"/>
  <text class="title" x="60" y="50">Online Fitness Coaching Platform - ER Diagram</text>
  <text class="subtitle" x="60" y="78">Designed for online trainers/influencers managing clients, programs, subscriptions, sessions, check-ins, progress and payments.</text>

  <!-- USERS -->
  <g id="users">
    <rect class="entity" x="60" y="120" width="310" height="235"/>
    <rect class="head" x="60" y="120" width="310" height="36"/>
    <text class="headText" x="76" y="144">USERS</text>
    <text class="key" x="76" y="180">PK user_id</text>
    <text class="attr" x="76" y="205">full_name</text>
    <text class="attr" x="76" y="230">email UK</text>
    <text class="attr" x="76" y="255">phone</text>
    <text class="attr" x="76" y="280">password_hash</text>
    <text class="attr" x="76" y="305">role: TRAINER / CLIENT / ADMIN</text>
    <text class="attr" x="76" y="330">status, created_at</text>
  </g>

  <!-- TRAINER_PROFILES -->
  <g id="trainer_profiles">
    <rect class="entity" x="60" y="430" width="310" height="210"/>
    <rect class="head" x="60" y="430" width="310" height="36"/>
    <text class="headText" x="76" y="454">TRAINER_PROFILES</text>
    <text class="key" x="76" y="490">PK/FK trainer_id -> USERS.user_id</text>
    <text class="attr" x="76" y="515">brand_name</text>
    <text class="attr" x="76" y="540">bio</text>
    <text class="attr" x="76" y="565">specialization</text>
    <text class="attr" x="76" y="590">certification_info</text>
    <text class="attr" x="76" y="615">instagram_handle</text>
  </g>

  <!-- CLIENT_PROFILES -->
  <g id="client_profiles">
    <rect class="entity" x="60" y="720" width="310" height="235"/>
    <rect class="head" x="60" y="720" width="310" height="36"/>
    <text class="headText" x="76" y="744">CLIENT_PROFILES</text>
    <text class="key" x="76" y="780">PK/FK client_id -> USERS.user_id</text>
    <text class="attr" x="76" y="805">date_of_birth</text>
    <text class="attr" x="76" y="830">gender</text>
    <text class="attr" x="76" y="855">height_cm</text>
    <text class="attr" x="76" y="880">fitness_goal</text>
    <text class="attr" x="76" y="905">medical_notes</text>
    <text class="attr" x="76" y="930">lifestyle_notes</text>
  </g>

  <!-- PROGRAMS -->
  <g id="programs">
    <rect class="entity" x="500" y="170" width="345" height="270"/>
    <rect class="head" x="500" y="170" width="345" height="36"/>
    <text class="headText" x="516" y="194">COACHING_PROGRAMS</text>
    <text class="key" x="516" y="230">PK program_id</text>
    <text class="fk" x="516" y="255">FK trainer_id -> TRAINER_PROFILES</text>
    <text class="attr" x="516" y="280">program_name</text>
    <text class="attr" x="516" y="305">description</text>
    <text class="attr" x="516" y="330">program_type: consultation/workout/diet/full/live</text>
    <text class="attr" x="516" y="355">duration_days</text>
    <text class="attr" x="516" y="380">price</text>
    <text class="attr" x="516" y="405">is_active, created_at</text>
  </g>

  <!-- ASSETS -->
  <g id="assets">
    <rect class="entity" x="500" y="515" width="345" height="210"/>
    <rect class="head" x="500" y="515" width="345" height="36"/>
    <text class="headText" x="516" y="539">PROGRAM_ASSETS</text>
    <text class="key" x="516" y="575">PK asset_id</text>
    <text class="fk" x="516" y="600">FK program_id -> COACHING_PROGRAMS</text>
    <text class="attr" x="516" y="625">asset_type: workout/diet/guide/video/document</text>
    <text class="attr" x="516" y="650">title</text>
    <text class="attr" x="516" y="675">content_or_url</text>
    <text class="attr" x="516" y="700">created_at</text>
  </g>

  <!-- SUBSCRIPTIONS -->
  <g id="subscriptions">
    <rect class="entity" x="940" y="220" width="360" height="285"/>
    <rect class="head" x="940" y="220" width="360" height="36"/>
    <text class="headText" x="956" y="244">SUBSCRIPTIONS</text>
    <text class="key" x="956" y="280">PK subscription_id</text>
    <text class="fk" x="956" y="305">FK client_id -> CLIENT_PROFILES</text>
    <text class="fk" x="956" y="330">FK trainer_id -> TRAINER_PROFILES</text>
    <text class="fk" x="956" y="355">FK program_id -> COACHING_PROGRAMS</text>
    <text class="attr" x="956" y="380">start_date</text>
    <text class="attr" x="956" y="405">end_date</text>
    <text class="attr" x="956" y="430">status: pending/active/paused/completed/cancelled</text>
    <text class="attr" x="956" y="455">auto_renew</text>
    <text class="attr" x="956" y="480">purchased_at</text>
  </g>

  <!-- PAYMENTS -->
  <g id="payments">
    <rect class="entity" x="940" y="585" width="360" height="260"/>
    <rect class="head" x="940" y="585" width="360" height="36"/>
    <text class="headText" x="956" y="609">PAYMENTS</text>
    <text class="key" x="956" y="645">PK payment_id</text>
    <text class="fk" x="956" y="670">FK subscription_id -> SUBSCRIPTIONS</text>
    <text class="fk" x="956" y="695">FK client_id -> CLIENT_PROFILES</text>
    <text class="attr" x="956" y="720">amount, currency</text>
    <text class="attr" x="956" y="745">payment_status: initiated/paid/failed/refunded</text>
    <text class="attr" x="956" y="770">payment_method</text>
    <text class="attr" x="956" y="795">transaction_reference</text>
    <text class="attr" x="956" y="820">paid_at</text>
  </g>

  <!-- SESSIONS -->
  <g id="sessions">
    <rect class="entity" x="1435" y="155" width="370" height="260"/>
    <rect class="head" x="1435" y="155" width="370" height="36"/>
    <text class="headText" x="1451" y="179">SESSIONS</text>
    <text class="key" x="1451" y="215">PK session_id</text>
    <text class="fk" x="1451" y="240">FK trainer_id -> TRAINER_PROFILES</text>
    <text class="fk" x="1451" y="265">FK program_id -> COACHING_PROGRAMS nullable</text>
    <text class="attr" x="1451" y="290">session_type: consultation/live/review/group</text>
    <text class="attr" x="1451" y="315">title</text>
    <text class="attr" x="1451" y="340">scheduled_start, scheduled_end</text>
    <text class="attr" x="1451" y="365">meeting_link</text>
    <text class="attr" x="1451" y="390">status: scheduled/completed/cancelled/no_show</text>
  </g>

  <!-- SESSION ATTENDEES -->
  <g id="attendees">
    <rect class="entity" x="1435" y="500" width="370" height="210"/>
    <rect class="head" x="1435" y="500" width="370" height="36"/>
    <text class="headText" x="1451" y="524">SESSION_ATTENDEES</text>
    <text class="key" x="1451" y="560">PK/FK session_id -> SESSIONS</text>
    <text class="key" x="1451" y="585">PK/FK client_id -> CLIENT_PROFILES</text>
    <text class="fk" x="1451" y="610">FK subscription_id -> SUBSCRIPTIONS nullable</text>
    <text class="attr" x="1451" y="635">attendance_status: booked/attended/missed/cancelled</text>
    <text class="attr" x="1451" y="660">client_notes</text>
  </g>

  <!-- CHECK INS -->
  <g id="checkins">
    <rect class="entity" x="500" y="870" width="365" height="285"/>
    <rect class="head" x="500" y="870" width="365" height="36"/>
    <text class="headText" x="516" y="894">CHECK_INS</text>
    <text class="key" x="516" y="930">PK check_in_id</text>
    <text class="fk" x="516" y="955">FK subscription_id -> SUBSCRIPTIONS</text>
    <text class="fk" x="516" y="980">FK client_id -> CLIENT_PROFILES</text>
    <text class="fk" x="516" y="1005">FK trainer_id -> TRAINER_PROFILES</text>
    <text class="attr" x="516" y="1030">check_in_date</text>
    <text class="attr" x="516" y="1055">weight_kg</text>
    <text class="attr" x="516" y="1080">mood_energy_sleep</text>
    <text class="attr" x="516" y="1105">workout_adherence, diet_adherence</text>
    <text class="attr" x="516" y="1130">client_report, submitted_at</text>
  </g>

  <!-- MEASUREMENTS -->
  <g id="measurements">
    <rect class="entity" x="940" y="950" width="360" height="235"/>
    <rect class="head" x="940" y="950" width="360" height="36"/>
    <text class="headText" x="956" y="974">BODY_MEASUREMENTS</text>
    <text class="key" x="956" y="1010">PK measurement_id</text>
    <text class="fk" x="956" y="1035">FK check_in_id -> CHECK_INS</text>
    <text class="attr" x="956" y="1060">chest_cm</text>
    <text class="attr" x="956" y="1085">waist_cm</text>
    <text class="attr" x="956" y="1110">hips_cm</text>
    <text class="attr" x="956" y="1135">arms_cm</text>
    <text class="attr" x="956" y="1160">thighs_cm, body_fat_percentage</text>
  </g>

  <!-- PHOTOS -->
  <g id="photos">
    <rect class="entity" x="1435" y="790" width="370" height="190"/>
    <rect class="head" x="1435" y="790" width="370" height="36"/>
    <text class="headText" x="1451" y="814">PROGRESS_PHOTOS</text>
    <text class="key" x="1451" y="850">PK photo_id</text>
    <text class="fk" x="1451" y="875">FK check_in_id -> CHECK_INS</text>
    <text class="attr" x="1451" y="900">photo_type: front/side/back/other</text>
    <text class="attr" x="1451" y="925">photo_url</text>
    <text class="attr" x="1451" y="950">uploaded_at</text>
  </g>

  <!-- FEEDBACK -->
  <g id="feedback">
    <rect class="entity" x="1435" y="1065" width="370" height="210"/>
    <rect class="head" x="1435" y="1065" width="370" height="36"/>
    <text class="headText" x="1451" y="1089">TRAINER_FEEDBACK</text>
    <text class="key" x="1451" y="1125">PK feedback_id</text>
    <text class="fk" x="1451" y="1150">FK check_in_id -> CHECK_INS</text>
    <text class="fk" x="1451" y="1175">FK trainer_id -> TRAINER_PROFILES</text>
    <text class="attr" x="1451" y="1200">notes</text>
    <text class="attr" x="1451" y="1225">action_items</text>
    <text class="attr" x="1451" y="1250">created_at</text>
  </g>

  <!-- relationships -->
  <path class="line" marker-start="url(#one)" marker-end="url(#one)" d="M215 355 L215 430"/>
  <text class="rel" x="232" y="397">1 to 0..1 trainer profile</text>
  <path class="line" marker-start="url(#one)" marker-end="url(#one)" d="M185 355 L185 720"/>
  <text class="rel" x="82" y="690">1 to 0..1 client profile</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M370 535 C430 535 430 305 500 305"/>
  <text class="rel" x="382" y="418">trainer creates 0..* programs</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M672 440 L672 515"/>
  <text class="rel" x="690" y="482">program contains 0..* assets</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M845 330 L940 330"/>
  <text class="rel" x="858" y="312">program has many subscriptions</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M370 830 C620 830 690 505 940 365"/>
  <text class="rel" x="510" y="812">client purchases 0..* subscriptions</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M370 565 C610 565 690 480 940 350"/>
  <text class="rel" x="475" y="545">trainer coaches 0..* subscriptions</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M1120 505 L1120 585"/>
  <text class="rel" x="1138" y="552">subscription has 0..* payments</text>
  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M370 870 C640 900 750 720 940 710"/>
  <text class="rel" x="478" y="902">client makes payments</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M370 500 C840 80 1140 110 1435 245"/>
  <text class="rel" x="585" y="138">trainer hosts 0..* sessions</text>
  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M845 260 C1110 170 1250 175 1435 265"/>
  <text class="rel" x="1065" y="190">program may include sessions</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M1620 415 L1620 500"/>
  <text class="rel" x="1638" y="465">session has attendees</text>
  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M370 875 C930 900 1120 615 1435 590"/>
  <text class="rel" x="1000" y="875">client books sessions</text>
  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M1300 455 C1380 470 1390 575 1435 610"/>
  <text class="rel" x="1312" y="532">subscription may grant access</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M940 470 C870 520 820 755 735 870"/>
  <text class="rel" x="780" y="760">subscription has 0..* check-ins</text>
  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M370 895 L500 1000"/>
  <text class="rel" x="386" y="980">client submits check-ins</text>
  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M370 615 C455 720 455 865 500 980"/>
  <text class="rel" x="390" y="780">trainer reviews check-ins</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#one)" d="M865 1040 L940 1040"/>
  <text class="rel" x="876" y="1020">check-in has 0..1 measurements</text>
  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M865 980 C1085 850 1220 850 1435 875"/>
  <text class="rel" x="1040" y="850">check-in has 0..* photos</text>
  <path class="line" marker-start="url(#one)" marker-end="url(#one)" d="M865 1110 C1100 1180 1225 1175 1435 1160"/>
  <text class="rel" x="1032" y="1222">check-in gets 0..1 feedback</text>
  <path class="line" marker-start="url(#one)" marker-end="url(#many)" d="M370 640 C850 1330 1130 1305 1435 1175"/>
  <text class="rel" x="560" y="1322">trainer writes feedback</text>

  <text class="note" x="60" y="1365">Legend: PK = primary key, FK = foreign key, UK = unique key. Crow-foot marker represents many; single bar represents one.</text>
  <text class="note" x="60" y="1392">Sessions are calendar events. Check-ins are progress reports. Program assets abstract workout plans, diet plans, documents and videos.</text>
</svg>
